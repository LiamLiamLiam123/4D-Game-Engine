  button.stop { background:#f87171; border:none; padding:6px 14px; border-radius:6px; font-weight:bold; cursor:pointer; }

  /* Palette */

    color:#fff; padding:6px 8px; margin:4px 0; border-radius:6px; cursor:grab;

  }
  .b-motion{background:#5b8def} .b-control{background:#e0a93e} .b-events{background:#d96b6b}
  .b-looks{background:#9c6ade} .b-4d{background:#36b3a8} .b-vars{background:#ff8c42} .b-sensing{background:#5cc9d6} .b-cstart{background:#666}

  /* Sprite list */
  #sprites { width:160px; background:#27293d; border-left:1px solid #444; border-right:1px solid #444; padding:8px; overflow-y:auto; }

  .script-block {

  .script-block input { width:38px; font-size:11px; border-radius:3px; border:none; padding:1px 3px; }
  .script-block select { font-size:10px; border-radius:3px; }
  .delbtn { float:right; cursor:pointer; color:#fff; opacity:.6; font-weight:bold; }
  .delbtn:hover{opacity:1;}
  .cwrap { border:1px dashed rgba(255,255,255,.4); border-radius:6px; padding:4px; margin-top:4px;}

  /* Stage */
  #stageWrap { width:440px; background:#000; display:flex; flex-direction:column; border-left:1px solid #444; }
  canvas { background:#0a0a14; display:block; }
  #stageInfo { font-size:11px; padding:6px; color:#aaa; background:#15161f; max-height:120px; overflow-y:auto;}
  #varPanel { padding:6px; font-size:11px; background:#15161f; border-top:1px solid #333; max-height:100px; overflow-y:auto;}

<div id="top">
  <h1>🧊 4D Scratch Engine</h1>
  <button class="run" onclick="runProject()">▶ Run</button>
  <button class="stop" onclick="stopProject()">■ Stop</button>
  <button class="add" onclick="saveProject()">💾 Save</button>

  <div id="palette"></div>

  <div id="sprites">
    <div class="cat">Objects</div>

    <button class="add" onclick="addSprite('16cell')">+ 16-cell</button>
    <button class="add" onclick="addSprite('5cell')">+ 5-cell</button>

  </div>

  <div id="scriptArea"></div>

    <div id="varPanel"></div>

<script>
/* ============================================================
   4D MATH
   ============================================================ */
const AXES = ['x','y','z','w'];
const PLANES = ['xy','xz','xw','yz','yw','zw'];

function rotate4D(v, plane, ang) {
  const [a,b] = plane;
  const ai = AXES.indexOf(a), bi = AXES.indexOf(b);
  const c = Math.cos(ang), s = Math.sin(ang);
  const va = v[ai], vb = v[bi];
  const r = v.slice();
  r[ai] = va*c - vb*s;
  r[bi] = va*s + vb*c;
  return r;
}

function makeTesseract() {
  let verts = [];
  for (let i=0;i<16;i++) verts.push([(i&1)?1:-1,(i&2)?1:-1,(i&4)?1:-1,(i&8)?1:-1]);
  let edges = [];
  for (let i=0;i<16;i++) for (let j=i+1;j<16;j++){
    let diff=0; for(let k=0;k<4;k++) if(verts[i][k]!==verts[j][k]) diff++;
    if (diff===1) edges.push([i,j]);
  }
  return {verts, edges};
}
function make16cell() {
  let verts=[];
  for(let i=0;i<4;i++){ let p=[0,0,0,0],m=[0,0,0,0]; p[i]=1; m[i]=-1; verts.push(p,m); }
  let edges=[];
  for(let i=0;i<8;i++) for(let j=i+1;j<8;j++) if(Math.floor(i/2)!==Math.floor(j/2)) edges.push([i,j]);
  return {verts, edges};
}
function make5cell() {
  let verts = [
    [ 1, 1, 1, -1/Math.sqrt(5)],[ 1,-1,-1, -1/Math.sqrt(5)],
    [-1, 1,-1, -1/Math.sqrt(5)],[-1,-1, 1, -1/Math.sqrt(5)],
    [ 0, 0, 0, 4/Math.sqrt(5)]
  ];
  let edges=[];
  for(let i=0;i<5;i++) for(let j=i+1;j<5;j++) edges.push([i,j]);
  return {verts, edges};
}
const SHAPE_MAKERS = {tesseract: makeTesseract, '16cell': make16cell, '5cell': make5cell};

/* ============================================================
   GLOBAL STATE
   ============================================================ */
let sprites = [];
let activeSprite = null;
let nextId = 1;
let globalVars = {}; // name -> value
let broadcasts = new Set(['Message1','Message2']);

function addSprite(shape='tesseract') {
  const id = nextId++;
  const s = {
    id, name: shape+id, shape,
    geom: SHAPE_MAKERS[shape](),
    x:0, y:0, z:0, w:0,
    vx:0, vy:0, vz:0, vw:0,
    rot: {xy:0, xz:0, xw:0, yz:0, yw:0, zw:0},
    scale: 1,
    color: ['#ff6b6b','#4ade80','#60a5fa','#fbbf24','#c084fc','#36b3a8'][(id-1)%6],
    visible:true,
    scripts: [],
    vars: {} // sprite-local vars: name->value
  };
  sprites.push(s);
  activeSprite = s;
  renderSpriteList();
  renderScriptArea();
  renderVarPanel();
  renderStage();
  return s;
}

function deleteSprite(s){
  sprites = sprites.filter(x=>x!==s);
  if(activeSprite===s) activeSprite = sprites[0]||null;
  renderSpriteList(); renderScriptArea(); renderVarPanel(); renderStage();
}

function renderSpriteList(){
  const el = document.getElementById('spriteList');
  el.innerHTML='';
  sprites.forEach(s=>{
    const d=document.createElement('div');
    d.className='sprite-item'+(s===activeSprite?' active':'');
    d.innerHTML = `<span>${s.name}</span><span><span style="color:${s.color}">●</span> <span class="del">✕</span></span>`;
    d.onclick=(e)=>{
      if(e.target.className==='del'){ deleteSprite(s); return; }
      activeSprite=s; renderSpriteList(); renderScriptArea(); renderVarPanel();
    };
    el.appendChild(d);
  });
}

/* sprite-local variable management */
function newVariable(){
  const name = prompt('New global variable name:');
  if(!name) return;
  globalVars[name]=0;
  renderVarPanel();
  renderPalette();
}
function newLocalVariable(){
  if(!activeSprite) return;
  const name = prompt('New variable name for '+activeSprite.name+':');
  if(!name) return;
  activeSprite.vars[name]=0;
  renderVarPanel();
  renderPalette();
}
function renderVarPanel(){
  const el = document.getElementById('varPanel');
  let html = '<b>Global:</b> ';
  for(const k in globalVars) html += `${k}=${round(globalVars[k])} &nbsp; `;
  html += '<br><b>'+(activeSprite?activeSprite.name:'')+':</b> ';
  if(activeSprite){
    html += `x=${round(activeSprite.x)} y=${round(activeSprite.y)} z=${round(activeSprite.z)} w=${round(activeSprite.w)}<br>`;
    for(const k in activeSprite.vars) html += `${k}=${round(activeSprite.vars[k])} &nbsp; `;
  }
  el.innerHTML = html;
}
function round(n){ return Math.round(n*100)/100; }

document.getElementById('globalVarList').innerHTML='';
</script>

<script>
/* ============================================================
   BLOCK DEFINITIONS
   Each block: {cat,label,fields,shape:'stack'|'cstart'|'cif'|'cifelse', run(...)}
   For C-blocks, 'body'/'body2' arrays hold nested stacks.
   run signature: (sprite, fields, ctx, state, block) -> 'wait'|'repeat'|undefined
   ============================================================ */
const KEYOPTS = ['w','a','s','d','q','e','r','f','t','g','up','down','left','right','space'];

function dynVarOptions(){
  let opts = Object.keys(globalVars);
  if(activeSprite) opts = opts.concat(Object.keys(activeSprite.vars));
  if(opts.length===0) opts=['(none)'];
  return opts;
}

const BLOCK_DEFS = {
  // EVENTS
  whenFlag: {cat:'events', label:'when 🚩 clicked', fields:[], isHat:true},
  whenKey: {cat:'events', label:'when key [key] pressed', fields:[{key:'key',type:'select',options:KEYOPTS,default:'space'}], isHat:true,
    test:(s,f,ctx)=>ctx.keys[f.key] && !ctx.prevKeys[f.key] },
  whenKeyDown: {cat:'events', label:'when key [key] is held', fields:[{key:'key',type:'select',options:KEYOPTS,default:'space'}], isHat:true,
    test:(s,f,ctx)=>ctx.keys[f.key] },
  whenReceive: {cat:'events', label:'when I receive [msg]', fields:[{key:'msg',type:'selectDyn',options:()=>[...broadcasts],default:'Message1'}], isHat:true,
    test:(s,f,ctx)=>ctx.received.has(f.msg) },
  broadcast: {cat:'events', label:'broadcast [msg]', shape:'stack', fields:[{key:'msg',type:'selectDyn',options:()=>[...broadcasts],default:'Message1'}],
    run:(s,f,ctx)=>{ ctx.toSend.add(f.msg); }
  },
  newBroadcast: {cat:'events', label:'+ new message', shape:'action', fields:[],
    action:()=>{ const n=prompt('Message name:'); if(n){broadcasts.add(n); renderPalette();} }
  },

  // MOTION / 4D
  move: {cat:'4d', label:'move [axis] by [n]', shape:'stack', fields:[
      {key:'axis',type:'select',options:AXES,default:'x'},{key:'n',type:'number',default:1}],
    run:(s,f)=>{ s[f.axis]+=Number(f.n); }
  },
  setpos: {cat:'4d', label:'set x:[x] y:[y] z:[z] w:[w]', shape:'stack', fields:[
      {key:'x',type:'number',default:0},{key:'y',type:'number',default:0},
      {key:'z',type:'number',default:0},{key:'w',type:'number',default:0}],
    run:(s,f)=>{ s.x=Number(f.x); s.y=Number(f.y); s.z=Number(f.z); s.w=Number(f.w); }
  },
  changevel: {cat:'4d', label:'change velocity [axis] by [n]', shape:'stack', fields:[
      {key:'axis',type:'select',options:AXES,default:'x'},{key:'n',type:'number',default:0.1}],
    run:(s,f)=>{ s['v'+f.axis]+=Number(f.n); }
  },
  applyvel: {cat:'4d', label:'apply velocity (with friction [n])', shape:'stack', fields:[{key:'n',type:'number',default:0.98}],
    run:(s,f)=>{ AXES.forEach(a=>{ s[a]+=s['v'+a]; s['v'+a]*=Number(f.n); }); }
  },
  rotate4d: {cat:'4d', label:'rotate plane [plane] by [deg]°', shape:'stack', fields:[
      {key:'plane',type:'select',options:PLANES,default:'xw'},{key:'deg',type:'number',default:1}],
    run:(s,f)=>{ s.rot[f.plane]+= Number(f.deg)*Math.PI/180; }
  },
  setscale: {cat:'4d', label:'set scale to [n]', shape:'stack', fields:[{key:'n',type:'number',default:1}],
    run:(s,f)=>{ s.scale=Number(f.n); }
  },
  bounce4d: {cat:'4d', label:'bounce if outside ±[n] (axes [axis])', shape:'stack', fields:[
      {key:'n',type:'number',default:3},{key:'axis',type:'select',options:['x','y','z','w','all'],default:'all'}],
    run:(s,f)=>{
      const lim=Number(f.n);
      const axesToCheck = f.axis==='all'?AXES:[f.axis];
      axesToCheck.forEach(a=>{
        if(s[a]>lim){ s[a]=lim; s['v'+a]*=-1; }
        if(s[a]<-lim){ s[a]=-lim; s['v'+a]*=-1; }
      });
    }
  },

  // LOOKS
  setcolor: {cat:'looks', label:'set color to [color]', shape:'stack', fields:[{key:'color',type:'color',default:'#ff6b6b'}],
    run:(s,f)=>{ s.color=f.color; }
  },
  show: {cat:'looks', label:'show', shape:'stack', fields:[], run:(s)=>{ s.visible=true; } },
  hide: {cat:'looks', label:'hide', shape:'stack', fields:[], run:(s)=>{ s.visible=false; } },
  say: {cat:'looks', label:'show message [text]', shape:'stack', fields:[{key:'text',type:'text',default:'Hello 4D!'}],
    run:(s,f,ctx)=>{ ctx.message = f.text; }
  },

  // VARIABLES
  setvarG: {cat:'vars', label:'set var [name] to [val]', shape:'stack', fields:[
      {key:'name',type:'selectDyn',options:dynVarOptions,default:'(none)'},{key:'val',type:'number',default:0}],
    run:(s,f)=>{ setVar(s,f.name,Number(f.val)); }
  },
  changevarG: {cat:'vars', label:'change var [name] by [val]', shape:'stack', fields:[
      {key:'name',type:'selectDyn',options:dynVarOptions,default:'(none)'},{key:'val',type:'number',default:1}],
    run:(s,f)=>{ setVar(s,f.name, getVar(s,f.name)+Number(f.val)); }
  },
  newLocalVarBtn: {cat:'vars', label:'+ new sprite variable', shape:'action', fields:[], action:()=>newLocalVariable() },

  // CONTROL
  repeatN: {cat:'control', label:'repeat [n] times', shape:'cstart', fields:[{key:'n',type:'number',default:10}],
    init:(state,f)=>{ state.count=0; },
    run:(s,f,ctx,state)=>{
      if(state.count>=Number(f.n)) { state.count=0; return; }
      state.count++; return 'repeat';
    }
  },
  forever: {cat:'control', label:'forever', shape:'cstart', fields:[],
    run:()=>{ return 'repeat'; }
  },
  ifBlock: {cat:'control', label:'if [cond] then', shape:'cif', fields:[
      {key:'cond',type:'cond',default:{op:'>',a:{type:'var',name:'(none)'},b:{type:'lit',val:0}}}],
    run:(s,f,ctx)=>{ return evalCond(s,f.cond,ctx) ? 'repeat':undefined; },
    once:true
  },
  ifElseBlock: {cat:'control', label:'if [cond] then / else', shape:'cifelse', fields:[
      {key:'cond',type:'cond',default:{op:'>',a:{type:'var',name:'(none)'},b:{type:'lit',val:0}}}],
    run:(s,f,ctx)=>{ return evalCond(s,f.cond,ctx)?'branch1':'branch2'; },
    once:true
  },
  wait: {cat:'control', label:'wait [n] frames', shape:'stack', fields:[{key:'n',type:'number',default:30}],
    run:(s,f,ctx,state)=>{
      if(state.waitLeft===undefined) state.waitLeft=Number(f.n);
      if(state.waitLeft>0){ state.waitLeft--; return 'wait'; }
      delete state.waitLeft;
    }
  },
  stopAll: {cat:'control', label:'stop all', shape:'stack', fields:[], run:(s,f,ctx)=>{ ctx.stopAll=true; } },

  // SENSING
  ifTouching: {cat:'sensing', label:'touching [target] (dist<[n])', shape:'stack', fields:[
      {key:'target',type:'selectDyn',options:()=>sprites.map(s=>s.name),default:''},
      {key:'n',type:'number',default:1.5}],
    run:()=>{} // used only inside conditions; placeholder so it appears in palette as info
  },
};

const CAT_CLASS = {events:'b-events', '4d':'b-4d', control:'b-control', looks:'b-looks', vars:'b-vars', sensing:'b-sensing'};

function getVar(s,name){
  if(s && name in s.vars) return s.vars[name];
  if(name in globalVars) return globalVars[name];
  return 0;
}
function setVar(s,name,val){
  if(s && name in s.vars) s.vars[name]=val;
  else globalVars[name]=val;
}

/* condition evaluator: cond = {op:'>','<','=','touching', a:{type:'var'|'lit',...}, b:{...}} */
function condValue(s,operand){
  if(!operand) return 0;
  if(operand.type==='lit') return operand.val;
  if(operand.type==='var') return getVar(s,operand.name);
  return 0;
}
function evalCond(s,cond,ctx){
  if(!cond) return false;
  if(cond.op==='touching'){
    const target = sprites.find(x=>x.name===cond.target);
    if(!target || target===s) return false;
    const d = Math.hypot(s.x-target.x,s.y-target.y,s.z-target.z,s.w-target.w);
    return d < (Number(cond.dist)||1.5);
  }
  if(cond.op==='key') return !!ctx.keys[cond.key];
  const a = condValue(s,cond.a), b = condValue(s,cond.b);
  switch(cond.op){
    case '>': return a>b;
    case '<': return a<b;
    case '=': return a===b;
    default: return false;
  }
}
</script>

<script>
/* ============================================================
   PALETTE
   ============================================================ */
function renderPalette(){
  const el = document.getElementById('palette');
  el.innerHTML='';
  const cats = {events:'Events', '4d':'4D Motion', looks:'Looks', vars:'Variables', control:'Control', sensing:'Sensing'};
  for(const c in cats){
    const h = document.createElement('div'); h.className='cat'; h.textContent=cats[c];
    el.appendChild(h);
    for(const key in BLOCK_DEFS){
      const def = BLOCK_DEFS[key];
      if(def.cat!==c) continue;
      const b = document.createElement('div');
      b.className='block '+CAT_CLASS[c];
      b.textContent = def.label.replace(/\[.*?\]/g,'_');
      if(def.shape==='action'){
        b.style.cursor='pointer';
        b.onclick=def.action;
        b.style.fontWeight='bold';
      } else {
        b.draggable=true;
        b.ondragstart=(e)=>{ e.dataTransfer.setData('text/plain', JSON.stringify({type:'new', blockType:key})); };
      }
      el.appendChild(b);
    }
  }
}
renderPalette();

/* ============================================================
   SCRIPT AREA — block tree model
   block = {type, fields:{...}, x,y (top-level only), body:[...], body2:[...]}
   scripts = array of top-level stacks; each stack = array of blocks (linear chain)
   ============================================================ */
function newBlockFromType(type){
  const def = BLOCK_DEFS[type];
  const fields={};
  def.fields.forEach(f=>{
    fields[f.key] = (typeof f.default==='object') ? JSON.parse(JSON.stringify(f.default)) : f.default;
  });
  const b = {type, fields};
  if(def.shape==='cstart'||def.shape==='cif') b.body=[];
  if(def.shape==='cifelse'){ b.body=[]; b.body2=[]; }
  return b;
}

function renderScriptArea(){
  const area = document.getElementById('scriptArea');
  area.innerHTML='';
  if(!activeSprite) return;
  activeSprite.scripts.forEach((stack)=>{
    const wrap = document.createElement('div');
    wrap.style.position='absolute';
    wrap.style.left=stack.x+'px';
    wrap.style.top=stack.y+'px';
    renderStack(stack.blocks, wrap, stack);
    area.appendChild(wrap);
  });
}

// renders a chain of blocks vertically inside container `wrap`
function renderStack(blocks, wrap, topStack){
  let yoff=0;
  blocks.forEach((block,i)=>{
    const def = BLOCK_DEFS[block.type];
    const div = document.createElement('div');
    div.className='script-block '+CAT_CLASS[def.cat];
    div.style.position='absolute';
    div.style.left='0px';
    div.style.top=yoff+'px';

    let html = def.label;
    def.fields.forEach(f=>{
      let inputHtml;
      if(f.type==='select'){
        inputHtml = `<select data-key="${f.key}">`+f.options.map(o=>`<option value="${o}" ${block.fields[f.key]===o?'selected':''}>${o}</option>`).join('')+`</select>`;
      } else if(f.type==='selectDyn'){
        const opts = f.options();
        inputHtml = `<select data-key="${f.key}">`+opts.map(o=>`<option value="${o}" ${block.fields[f.key]===o?'selected':''}>${o}</option>`).join('')+`</select>`;
      } else if(f.type==='color'){
        inputHtml = `<input type="color" data-key="${f.key}" value="${block.fields[f.key]}">`;
      } else if(f.type==='text'){
        inputHtml = `<input type="text" data-key="${f.key}" value="${block.fields[f.key]}" style="width:70px">`;
      } else if(f.type==='cond'){
        inputHtml = renderCondEditor(block.fields[f.key]);
      } else {
        inputHtml = `<input type="number" data-key="${f.key}" value="${block.fields[f.key]}">`;
      }
      html = html.replace('['+f.key+']', inputHtml);
    });
    div.innerHTML = `<span class="delbtn">✕</span> ${html}`;

    // delete (and children)
    div.querySelector('.delbtn').onclick=(e)=>{
      e.stopPropagation();
      removeBlockAndAfter(topStack, blocks, i);
      renderScriptArea();
    };

    // field inputs
    div.querySelectorAll('[data-key]').forEach(inp=>{
      inp.addEventListener('change',()=>{ block.fields[inp.dataset.key]=inp.value; });
      inp.addEventListener('mousedown',e=>e.stopPropagation());
    });
    // cond editor sub-inputs
    div.querySelectorAll('[data-condkey]').forEach(inp=>{
      inp.addEventListener('change',()=>{ updateCondField(block.fields, inp); renderScriptArea(); });
      inp.addEventListener('mousedown',e=>e.stopPropagation());
    });

    // dragging whole sub-chain (this block + everything after it in this list)
    div.addEventListener('mousedown',(e)=>{
      if(['SELECT','INPUT'].includes(e.target.tagName)||e.target.className==='delbtn') return;
      startDragChain(blocks, i, topStack, e);
      e.preventDefault();
    });

    wrap.appendChild(div);
    yoff += 32;

    // C-block body slots
    if(def.shape==='cstart' || def.shape==='cif'){
      const slot = document.createElement('div');
      slot.className='cwrap';
      slot.style.position='absolute';
      slot.style.left='14px'; slot.style.top=yoff+'px';
      slot.style.minHeight='28px'; slot.style.minWidth='160px';
      slot.dataset.dropTarget='body';
      renderStack(block.body, slot, topStack);
      wrap.appendChild(slot);
      const bh = Math.max(28, block.body.length*32+8);
      yoff += bh + 6;
    }
    if(def.shape==='cifelse'){
      const slot1 = document.createElement('div');
      slot1.className='cwrap'; slot1.style.position='absolute';
      slot1.style.left='14px'; slot1.style.top=yoff+'px';
      slot1.style.minHeight='28px'; slot1.style.minWidth='160px';
      slot1.innerHTML='';
      renderStack(block.body, slot1, topStack);
      wrap.appendChild(slot1);
      let bh1 = Math.max(28, block.body.length*32+8);
      yoff += bh1+2;
      const elseLabel=document.createElement('div');
      elseLabel.style.position='absolute'; elseLabel.style.left='0px'; elseLabel.style.top=yoff+'px';
      elseLabel.style.fontSize='10px'; elseLabel.style.color='#fbbf24'; elseLabel.textContent='else:';
      wrap.appendChild(elseLabel);
      yoff += 16;
      const slot2 = document.createElement('div');
      slot2.className='cwrap'; slot2.style.position='absolute';
      slot2.style.left='14px'; slot2.style.top=yoff+'px';
      slot2.style.minHeight='28px'; slot2.style.minWidth='160px';
      renderStack(block.body2, slot2, topStack);
      wrap.appendChild(slot2);
      let bh2 = Math.max(28, block.body2.length*32+8);
      yoff += bh2+6;
    }
  });
  wrap.style.minHeight = Math.max(4,yoff)+'px';
  wrap.style.minWidth = '160px';
  // store helper for drop detection
  wrap._blocksRef = blocks;
}

function renderCondEditor(cond){
  if(cond.op==='touching'){
    return `<select data-condkey="op"><option value="touching" selected>touching</option><option value=">">&gt;</option><option value="<">&lt;</option><option value="=">=</option><option value="key">key down</option></select>
      <select data-condkey="target">${sprites.map(s=>`<option value="${s.name}" ${cond.target===s.name?'selected':''}>${s.name}</option>`).join('')}</select>
      dist&lt;<input type="number" data-condkey="dist" value="${cond.dist||1.5}" style="width:30px">`;
  }
  if(cond.op==='key'){
    return `<select data-condkey="op"><option value="touching">touching</option><option value=">">&gt;</option><option value="<">&lt;</option><option value="=">=</option><option value="key" selected>key down</option></select>
      <select data-condkey="key">${KEYOPTS.map(k=>`<option value="${k}" ${cond.key===k?'selected':''}>${k}</option>`).join('')}</select>`;
  }
  const varOpts = dynVarOptions();
  return `<select data-condkey="op"><option value="touching">touching</option><option value=">" ${cond.op==='>'?'selected':''}>&gt;</option><option value="<" ${cond.op==='<'?'selected':''}>&lt;</option><option value="=" ${cond.op==='='?'selected':''}>=</option><option value="key">key down</option></select>
    <select data-condkey="aType"><option value="var" ${cond.a.type==='var'?'selected':''}>var</option><option value="lit" ${cond.a.type==='lit'?'selected':''}>num</option></select>
    ${cond.a.type==='var' ? `<select data-condkey="aName">${varOpts.map(o=>`<option value="${o}" ${cond.a.name===o?'selected':''}>${o}</option>`).join('')}</select>`
      : `<input type="number" data-condkey="aVal" value="${cond.a.val||0}" style="width:30px">`}
    <select data-condkey="bType"><option value="lit" ${cond.b.type==='lit'?'selected':''}>num</option><option value="var" ${cond.b.type==='var'?'selected':''}>var</option></select>
    ${cond.b.type==='var' ? `<select data-condkey="bName">${varOpts.map(o=>`<option value="${o}" ${cond.b.name===o?'selected':''}>${o}</option>`).join('')}</select>`
      : `<input type="number" data-condkey="bVal" value="${cond.b.val||0}" style="width:30px">`}`;
}
function updateCondField(fields, inp){
  const cond = fields.cond;
  const k = inp.dataset.condkey, v = inp.value;
  if(k==='op'){
    if(v==='touching'){ Object.assign(cond,{op:'touching',target:sprites[0]?sprites[0].name:'',dist:1.5}); }
    else if(v==='key'){ Object.assign(cond,{op:'key',key:'space'}); }
    else { cond.op=v; if(!cond.a) cond.a={type:'lit',val:0}; if(!cond.b) cond.b={type:'lit',val:0}; }
  }
  else if(k==='target') cond.target=v;
  else if(k==='dist') cond.dist=Number(v);
  else if(k==='key') cond.key=v;
  else if(k==='aType') cond.a = cond.a.type===v? cond.a : (v==='var'?{type:'var',name:dynVarOptions()[0]}:{type:'lit',val:0});
  else if(k==='aName') cond.a.name=v;
  else if(k==='aVal') cond.a.val=Number(v);
  else if(k==='bType') cond.b = cond.b.type===v? cond.b : (v==='var'?{type:'var',name:dynVarOptions()[0]}:{type:'lit',val:0});
  else if(k==='bName') cond.b.name=v;
  else if(k==='bVal') cond.b.val=Number(v);
}

/* remove block at index i and everything after it from `blocks` array */
function removeBlockAndAfter(topStack, blocks, i){
  blocks.splice(i, blocks.length-i);
  if(topStack.blocks.length===0){
    activeSprite.scripts = activeSprite.scripts.filter(s=>s!==topStack);
  }
}

/* ============================================================
   DRAG & DROP for reordering / nesting existing blocks
   ============================================================ */
let dragData=null;
function startDragChain(blocks, idx, topStack, e){
  const chain = blocks.splice(idx, blocks.length-idx); // remove this block + rest of chain
  if(blocks.length===0 && topStack.blocks.length===0){
    activeSprite.scripts = activeSprite.scripts.filter(s=>s!==topStack);
  }
  dragData = {chain};
  renderScriptArea();
  // ghost follow
  const ghost = document.createElement('div');
  ghost.id='dragGhost';
  ghost.style.position='fixed'; ghost.style.pointerEvents='none'; ghost.style.zIndex=999;
  ghost.style.padding='4px 8px'; ghost.style.background='#5b8def'; ghost.style.borderRadius='6px';
  ghost.style.fontSize='11px'; ghost.style.color='#fff';
  ghost.textContent = BLOCK_DEFS[chain[0].type].label.replace(/\[.*?\]/g,'_') + (chain.length>1?` (+${chain.length-1})`:'');
  document.body.appendChild(ghost);
  ghost.style.left=e.clientX+'px'; ghost.style.top=e.clientY+'px';

  function move(ev){
    ghost.style.left=ev.clientX+'px'; ghost.style.top=ev.clientY+'px';
  }
  function up(ev){
    document.removeEventListener('mousemove',move);
    document.removeEventListener('mouseup',up);
    ghost.remove();
    handleDrop(ev.clientX, ev.clientY);
    dragData=null;
  }
  document.addEventListener('mousemove',move);
  document.addEventListener('mouseup',up);
}

function handleDrop(clientX, clientY){
  if(!dragData) return;
  const area = document.getElementById('scriptArea');
  const rect = area.getBoundingClientRect();
  const x = clientX-rect.left+area.scrollLeft, y = clientY-rect.top+area.scrollTop;

  // try find a block under cursor to attach below, or a cwrap slot to drop into
  const els = document.elementsFromPoint(clientX,clientY);
  // check for cwrap slot (empty area inside C-block)
  for(const el of els){
    if(el.classList && el.classList.contains('cwrap') && el._blocksRef){
      el._blocksRef.push(...dragData.chain);
      renderScriptArea();
      return;
    }
  }
  for(const el of els){
    if(el.classList && el.classList.contains('script-block')){
      // find its containing list & index via closest wrap
      const parentWrap = el.parentElement;
      if(parentWrap && parentWrap._blocksRef){
        const idx = Array.from(parentWrap.children).filter(c=>c.classList.contains('script-block')).indexOf(el);
        parentWrap._blocksRef.splice(idx+1,0,...dragData.chain);
        renderScriptArea();
        return;
      }
    }
  }
  // else: place as new top-level stack at drop position
  activeSprite.scripts.push({x, y, blocks: dragData.chain});
  renderScriptArea();
}

/* drop NEW block from palette */
const scriptArea = document.getElementById('scriptArea');
scriptArea.addEventListener('dragover', e=>e.preventDefault());
scriptArea.addEventListener('drop', e=>{
  e.preventDefault();
  if(!activeSprite) return;
  const data = JSON.parse(e.dataTransfer.getData('text/plain'));
  if(data.type!=='new') return;
  const newBlock = newBlockFromType(data.blockType);
  const rect = scriptArea.getBoundingClientRect();
  const x = e.clientX-rect.left+scriptArea.scrollLeft, y = e.clientY-rect.top+scriptArea.scrollTop;

  // try attach to existing block / slot
  const els = document.elementsFromPoint(e.clientX,e.clientY);
  for(const el of els){
    if(el.classList && el.classList.contains('cwrap') && el._blocksRef){
      el._blocksRef.push(newBlock);
      renderScriptArea(); return;
    }
  }
  for(const el of els){
    if(el.classList && el.classList.contains('script-block')){
      const parentWrap = el.parentElement;
      if(parentWrap && parentWrap._blocksRef){
        const idx = Array.from(parentWrap.children).filter(c=>c.classList.contains('script-block')).indexOf(el);
        parentWrap._blocksRef.splice(idx+1,0,newBlock);
        renderScriptArea(); return;
      }
    }
  }
  activeSprite.scripts.push({x,y,blocks:[newBlock]});
  renderScriptArea();
});
</script>

<script>
/* ============================================================
   PROJECTION & RENDERING (4D -> 3D -> 2D)
   ============================================================ */
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');

function project4Dto3D(v, wDist=3){
  const wf = wDist/(wDist - v[3]);
  return [v[0]*wf, v[1]*wf, v[2]*wf];
}
function project3Dto2D(v, dist=4){
  const f = dist/(dist - v[2]);
  return [v[0]*f, v[1]*f];
}
function drawSprite(s){
  if(!s.visible) return;
  const {verts, edges} = s.geom;
  const pts2d = verts.map(v=>{
    let p = v.map(x=>x*s.scale);
    for(const plane of PLANES) if(s.rot[plane]) p = rotate4D(p, plane, s.rot[plane]);
    p = [p[0]+s.x, p[1]+s.y, p[2]+s.z, p[3]+s.w];
    const p3 = project4Dto3D(p);
    return project3Dto2D(p3);
  });
  ctx.strokeStyle = s.color;
  ctx.lineWidth = (s===activeSprite)?2:1;
  edges.forEach(([a,b])=>{
    const pa=pts2d[a], pb=pts2d[b];
    ctx.beginPath();
    ctx.moveTo(canvas.width/2 + pa[0]*60, canvas.height/2 + pa[1]*60);
    ctx.lineTo(canvas.width/2 + pb[0]*60, canvas.height/2 + pb[1]*60);
    ctx.stroke();
  });
}
let currentMessage='';
function renderStage(){
  if(!ctx) return;
  ctx.fillStyle='#0a0a14';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  sprites.forEach(drawSprite);
  if(currentMessage){
    ctx.fillStyle='#fff'; ctx.font='14px Arial';
    ctx.fillText(currentMessage, 10, canvas.height-10);
  }
  renderVarPanel();
}

/* ============================================================
   RUNTIME / INTERPRETER  (recursive, frame-stepped via generators)
   ============================================================ */
let running=false;
let keys={}, prevKeys={};
let runtimeState=new Map();
let receivedMsgs=new Set();
let pendingMsgs=new Set();

window.addEventListener('keydown', e=>{
  const k=e.key.toLowerCase();
  const map={'arrowup':'up','arrowdown':'down','arrowleft':'left','arrowright':'right',' ':'space'};
  keys[map[k]||k]=true;
});
window.addEventListener('keyup', e=>{
  const k=e.key.toLowerCase();
  const map={'arrowup':'up','arrowdown':'down','arrowleft':'left','arrowright':'right',' ':'space'};
  keys[map[k]||k]=false;
});

function runProject(){
  running=true;
  runtimeState=new Map();
  receivedMsgs=new Set();
  loop();
}
function stopProject(){ running=false; }

// Build a generator that executes a block list, yielding 'frame' to pause for one frame
function* execBlocks(blocks, s, ctx, statePathPrefix){
  for(let i=0;i<blocks.length;i++){
    const b = blocks[i];
    const def = BLOCK_DEFS[b.type];
    const path = statePathPrefix+'/'+i;
    if(def.shape==='cstart'){
      let st = runtimeState.get(path)||{};
      if(def.init) def.init(st,b.fields);
      runtimeState.set(path,st);
      while(true){
        const r = def.run(s,b.fields,ctx,st,b);
        if(r==='repeat'){
          yield* execBlocks(b.body, s, ctx, path+'/b');
          yield 'frame';
        } else break;
      }
    } else if(def.shape==='cif'){
      if(evalCond(s,b.fields.cond,ctx)){
        yield* execBlocks(b.body, s, ctx, path+'/b');
      }
    } else if(def.shape==='cifelse'){
      if(evalCond(s,b.fields.cond,ctx)){
        yield* execBlocks(b.body, s, ctx, path+'/b1');
      } else {
        yield* execBlocks(b.body2, s, ctx, path+'/b2');
      }
    } else {
      let st = runtimeState.get(path)||{};
      while(true){
        const r = def.run(s,b.fields,ctx,st,b);
        runtimeState.set(path,st);
        if(r==='wait'){ yield 'frame'; continue; }
        break;
      }
    }
  }
}

// per-sprite, per-script generator instances
let activeGens = []; // {s, gen, scriptId}

function startScripts(){
  activeGens=[];
  sprites.forEach(s=>{
    s.scripts.forEach((stack,idx)=>{
      const hat = stack.blocks[0];
      if(!hat) return;
      const def = BLOCK_DEFS[hat.type];
      if(!def || !def.isHat) return;
      activeGens.push({s, stack, idx});
    });
  });
}
startScripts();

function loop(){
  if(!running) return;
  prevKeys = Object.assign({},keys);
  const ctx = {keys, prevKeys, message:currentMessage, toSend:new Set(), received: receivedMsgs, stopAll:false};

  // refresh script list in case user edited while running
  startScripts();

  for(const entry of activeGens){
    const {s, stack, idx} = entry;
    const hat = stack.blocks[0];
    const def = BLOCK_DEFS[hat.type];
    const key = 'gen_'+s.id+'_'+idx;
    let triggered=false;
    if(hat.type==='whenFlag') triggered = !runtimeState.get(key+'_done');
    else if(def.test) triggered = def.test(s,hat.fields,ctx);

    let gs = runtimeState.get(key);
    if(triggered && !gs){
      gs = execBlocks(stack.blocks.slice(1), s, ctx, key);
      runtimeState.set(key, gs);
      if(hat.type==='whenFlag') runtimeState.set(key+'_done', true);
    }
    if(gs){
      try {
        const r = gs.next();
        if(r.done) runtimeState.delete(key);
      } catch(err){ console.error(err); runtimeState.delete(key); }
    }
  }

  // collisions auto-stop velocity at... handled via blocks only
  receivedMsgs = ctx.toSend;
  currentMessage = ctx.message;
  if(ctx.stopAll){ running=false; renderStage(); return; }
  renderStage();
  requestAnimationFrame(loop);
}

/* ============================================================
   SAVE / LOAD
   ============================================================ */
function saveProject(){
  const data = {
    nextId, globalVars, broadcasts:[...broadcasts],
    sprites: sprites.map(s=>({
      id:s.id,name:s.name,shape:s.shape,x:s.x,y:s.y,z:s.z,w:s.w,
      rot:s.rot,scale:s.scale,color:s.color,visible:s.visible,
      scripts:s.scripts, vars:s.vars
    }))
  };
  const blob = new Blob([JSON.stringify(data)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='4dscratch-project.json'; a.click();
}
function loadProject(ev){
  const file=ev.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    const data=JSON.parse(reader.result);
    nextId=data.nextId; globalVars=data.globalVars||{}; broadcasts=new Set(data.broadcasts||['Message1','Message2']);
    sprites = data.sprites.map(sd=>{
      const s = Object.assign({geom:SHAPE_MAKERS[sd.shape](), vx:0,vy:0,vz:0,vw:0}, sd);
      return s;
    });
    activeSprite = sprites[0]||null;
    renderSpriteList(); renderScriptArea(); renderVarPanel(); renderPalette(); renderStage();
  };
  reader.readAsText(file);
}

/* initial render */
renderStage();
addSprite('tesseract');
canvas.tabIndex=0;
canvas.addEventListener('click',()=>canvas.focus());
</script>
